<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Rackers</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      img {
        object-fit: contain;
        width: 100%;
        height: 100vh;
        border: 0;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      .show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <img
        id="minha-imagem"
        src="imgs/tv-rackers-vc-na-rackers.gif"
        alt="Imagem GIF"
        class="show"
      />
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
