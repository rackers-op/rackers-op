<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Rackers</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      img {
        object-fit: contain;
        width: 100%;
        height: 100vh;
        border: 0;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      .show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <img
        id="minha-imagem"
        src="imgs/tv-rackers-vc-na-rackers.gif"
        alt="Imagem GIF"
        class="show"
      />
    </div>

    <script>
      const tempoFade = 1000;

      let indiceImagem = 0;

      const imagens = [
        ["imgs/tv-rackers-vc-na-rackers.gif", 6000],
        ["imgs/tv-rackers-tribos.png", 10000],
        ["imgs/tv-rackers-estrutura.png", 10000],
        ["imgs/tv-rackers-aniversario.gif", 12000]
      ];

      function mostrarImagem() {
        const imagem = document.getElementById("minha-imagem");
        const tempoImagem = imagens[indiceImagem][1];
        imagem.src = imagens[indiceImagem][0];
        imagem.classList.add("show");
        
        setTimeout(() => {
          imagem.classList.remove("show");
          indiceImagem = (indiceImagem + 1) % imagens.length;
          setTimeout(() => {
            mostrarImagem();
          }, tempoFade);
        }, tempoImagem - tempoFade);
      }

      window.onload = function () {
        mostrarImagem();
      };
    </script>
  </body>
</html>
